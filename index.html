<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Recipe Oracle // Gemini Powered</title>
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: #0b1329;
            --accent-cyan: #00f0ff;
            --accent-blue: #0066ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --glow-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            opacity: 0.8;
            pointer-events: none;
            background-size: 100% 4px, 6px 100%;
        }

        .container {
            max-width: 800px;
            width: 100%;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: var(--glow-shadow);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Hexagon Container */
        .hexagon-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .hexagon {
            width: 160px;
            height: 180px;
            background: var(--panel-bg);
            position: relative;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-cyan);
            box-shadow: var(--glow-shadow);
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .hexagon::before {
            content: '';
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            background: var(--bg-color);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 1;
        }

        .hexagon-content {
            z-index: 2;
            color: var(--accent-cyan);
            font-size: 2.5rem;
            animation: pulse 3s infinite alternate;
        }

        .hexagon:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px var(--accent-cyan));
        }

        /* Config Panel (API Key) */
        .config-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .config-panel label {
            display: block;
            font-size: 0.8rem;
            color: var(--accent-cyan);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .config-panel input {
            width: 100%;
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.4);
            padding: 8px 12px;
            color: var(--accent-cyan);
            font-size: 0.9rem;
            border-radius: 2px;
            outline: none;
        }

        /* Main Interface */
        .interface-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(3, 7, 18, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-left: 4px solid var(--accent-cyan);
            padding: 15px;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 12px 28px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        button:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: var(--glow-shadow);
            text-shadow: 0 0 5px var(--accent-cyan);
        }

        button:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            text-shadow: none;
            background: transparent;
        }

        /* Output Terminal */
        .terminal-output {
            margin-top: 30px;
            background: rgba(3, 7, 18, 0.9);
            border: 1px solid rgba(0, 94, 255, 0.3);
            border-radius: 2px;
            padding: 20px;
            min-height: 150px;
            display: none;
            position: relative;
        }

        .terminal-output.active {
            display: block;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            color: var(--accent-blue);
        }

        .terminal-content {
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }

        .terminal-content h3 {
            color: var(--accent-cyan);
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .status-loading {
            color: var(--accent-cyan);
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Recipe Oracle</h1>
            <div class="subtitle">System Status: Operational // Powered by Gemini AI</div>
        </header>

        <div class="hexagon-wrapper">
            <div class="hexagon" id="hexCore">
                <div class="hexagon-content">⬢</div>
            </div>
        </div>

        <div class="config-panel">
            <label for="apiKey">Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="Вставьте ваш API ключ от Google AI Studio (AI_KEY)...">
        </div>

        <div class="interface-panel">
            <div class="input-group">
                <textarea id="userInput" placeholder="Введите ингредиенты через запятую или напишите пожелание (например: 'Быстрый и сытный ужин за 20 минут, без мяса')"></textarea>
            </div>
            <div class="btn-container">
                <button id="submitBtn" onclick="queryOracle()">Запустить синтез</button>
            </div>

            <div class="terminal-output" id="terminalBox">
                <div class="terminal-header">
                    <span>OUTPUT_LOG // RECIPE_SYNTHESIS</span>
                    <span id="timestamp">00:00:00</span>
                </div>
                <div class="terminal-content" id="terminalText"></div>
            </div>
        </div>
    </div>

    <script>
        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateTimestamp, 1000);
        updateTimestamp();

        async function queryOracle() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const userInput = document.getElementById('userInput').value.trim();
            const terminalBox = document.getElementById('terminalBox');
            const terminalText = document.getElementById('terminalText');
            const submitBtn = document.getElementById('submitBtn');
            const hexCore = document.getElementById('hexCore');

            if (!userInput) {
                alert('Пожалуйста, введите ингредиенты или описание запроса.');
                return;
            }

            if (!apiKey) {
                alert('Для работы необходим Gemini API Key. Вы можете получить его бесплатно в Google AI Studio.');
                return;
            }

            // UI Feedback
            submitBtn.disabled = true;
            terminalBox.classList.add('active');
            terminalText.innerHTML = '<span class="status-loading">Инициализация нейросети... Подключение к матрице данных...</span>';
            hexCore.style.filter = 'drop-shadow(0 0 25px #0066ff)';
            hexCore.style.borderColor = '#0066ff';

            const systemPrompt = `Ты — Кибер-Шеф, ИИ-модуль из вселенной Матрицы. Твоя задача — генерировать лаконичные, понятные и практичные рецепты на основе запроса пользователя. 
Ответ должен быть строго структурирован в цифровом стиле:
1. НАЗВАНИЕ БЛЮДА (выдели капсом)
2. ВРЕМЯ ПРИГОТОВЛЕНИЯ
3. НЕОБХОДИМЫЕ КОМПОНЕНТЫ (списком)
4. АЛГОРИТМ ПРИГОТОВЛЕНИЯ (пошагово, емко)
Избегай лишней "воды", пиши технично, профессионально, но доступно. Твой стиль — упорядоченный цифровой минимализм.`;

            try {
                // Using Gemini 1.5 Flash via direct fetch for standard single-page application integration
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `${systemPrompt}\n\nЗапрос пользователя: ${userInput}` }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || 'Ошибка сервера Gemini API');
                }

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                
                // Format markdown headers to simple styling if needed, or keep it raw for strict monospace look
                let formattedText = rawText
                    .replace(/\*\*(.*?)\*\*/g, '<h3>$1</h3>')
                    .replace(/\*(.*?)\*/g, '$1');

                terminalText.innerHTML = formattedText;

            } catch (error) {
                terminalText.innerHTML = `<span style="color: #ff0055;">[КРИТИЧЕСКАЯ ОШИБКА]: Сбой канала связи.\nПричина: ${error.message}</span>`;
            } finally {
                submitBtn.disabled = false;
                hexCore.style.filter = 'var(--glow-shadow)';
                hexCore.style.borderColor = 'var(--accent-cyan)';
            }
        }
    </script>
</body>
</html>
